<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="../style/output.css" rel="stylesheet">
    <title>Document</title>
</head>
<body class="bg-slate-200">

    <main class="w-full min-h-screen flex md:flex-row flex-col items-center justify-center mx-auto">

        <section class="w-full flex-1 flex justify-center items-center flex-col">

            <div class="w-full max-w-xl flex justify-center items-center flex-col gap-4">
                <img 
                src="/src/assets/user.png" 
                alt="logo do usuário"
                class="w-36 hover:scale-110 duration-300"
                >
                <h1 class="text-4xl font-bold mb-7">Login</h1>

                <input 
                type="text" 
                placeholder="Enter your e-mail"
                class="w-80 md:w-full p-2 rounded-lg outline-none bg-gray-50 focus:bg-white"
                >

                <input 
                type="text" 
                placeholder="*********"
                class="w-80 md:w-full p-2 rounded-lg outline-none bg-gray-50 focus:bg-white"
                >

                <div class="flex items-center justify-between md:w-full w-96">
                <div class="flex items-center gap-2">
                    <input type="checkbox">
                    <label class="font-medium">Remember password</label>
                </div>

                <a href="#" class="text-sky-600 hover:text-sky-500 duration-200">Forgot your password?</a>

            </div>

                <button class="w-80 md:w-full bg-blue-600 p-2 rounded-lg text-white font-medium hover:bg-blue-500 duration-500">
                    Access
                </button>

                <p>
                    Don't have an account? 
                    <a href="#" class="font-medium text-sky-600 hover:text-sky-500 duration-200">create an account</a>
                </p>

            </div>

        </section>

        <section class="hidden md:flex gap-9 w-full flex-1 bg-blue-500 h-screen items-center flex-col p-4 justify-center">

            <h1 class="text-white text-3xl text-center max-w-lg lg:text-4xl ">
                Master the <strong>most sought-after technologies</strong> in the market
            </h1>

            <img src="/src/assets/techs.png" 
            alt="tech"
            class="w-3/4 lg:w-full lg:max-w-md"
            >

        </section>

    </main>
</body>
</html>
